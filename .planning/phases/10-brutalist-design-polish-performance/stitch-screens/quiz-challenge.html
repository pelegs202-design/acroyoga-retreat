<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AcroHavura Mobile Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Heebo', sans-serif;
            background-color: #0a0a0a;
            color: #ffffff;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .brutalist-border {
            border: 2px solid #262626;
        }
        .brutalist-selected {
            border-color: #F472B6;
            box-shadow: 0 0 15px rgba(244, 114, 182, 0.3);
        }
        .btn-pink {
            background-color: #F472B6;
            color: #000000;
        }
        .progress-bar {
            height: 4px;
            background-color: #262626;
            width: 100%;
        }
        .progress-fill {
            height: 100%;
            background-color: #F472B6;
            width: 30%;
        }
    </style>
</head>
<body class="flex flex-col h-screen">

    <!-- Progress Bar -->
    <div class="fixed top-0 left-0 right-0 z-50">
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <div class="p-4 flex justify-end text-xs font-bold text-neutral-400">
            3/10
        </div>
    </div>

    <!-- Content -->
    <main class="flex-grow flex flex-col items-center justify-center px-6 pt-16 pb-32">
        <h1 class="text-4xl font-black text-center mb-12 leading-tight">
            מה הרמה<br>שלך?
        </h1>

        <div class="w-full space-y-4">
            <!-- Option 1 -->
            <div class="brutalist-border p-5 text-center font-bold text-lg cursor-pointer hover:bg-neutral-900 transition-colors">
                מתחיל/ה / ה פעם ראשונה
            </div>

            <!-- Option 2 (Selected) -->
            <div class="brutalist-border brutalist-selected p-5 text-center font-bold text-lg bg-neutral-900 cursor-pointer">
                מתרגל/ת / ת בסיסי
            </div>

            <!-- Option 3 -->
            <div class="brutalist-border p-5 text-center font-bold text-lg cursor-pointer hover:bg-neutral-900 transition-colors">
                בינוני / ת - ג'אמים קבועים
            </div>

            <!-- Option 4 -->
            <div class="brutalist-border p-5 text-center font-bold text-lg cursor-pointer hover:bg-neutral-900 transition-colors">
                מתקדם / ת - רמה גבוהה
            </div>
        </div>
    </main>

    <!-- Footer Controls -->
    <footer class="fixed bottom-0 left-0 right-0 p-6 space-y-4 bg-gradient-to-t from-[#0a0a0a] to-transparent">
        <div class="text-center">
            <a href="#" class="text-neutral-400 text-sm font-bold uppercase tracking-wider hover:text-white">חזרה</a>
        </div>
        <button class="w-full py-5 text-xl font-black btn-pink uppercase tracking-tighter">
            הבא
        </button>
    </footer>

</body>
</html>
